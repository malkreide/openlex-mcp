name: Live Tests (nightly + manual)

on:
  schedule:
    - cron: "0 4 * * *"  # 04:00 UTC every day
  workflow_dispatch:       # manual trigger from Actions UI

jobs:
  live-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20   # pip install (~60 s) + HF download (~60 s) + tests (~30 s)

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run live tests
        run: PYTHONPATH=src pytest -m live -v
        timeout-minutes: 10
